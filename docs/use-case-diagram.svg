<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .title { font: 700 34px 'Arial', sans-serif; fill: #2f3845; }
      .system-title { font: 700 26px 'Arial', sans-serif; fill: #2f3845; }
      .actor { font: 600 24px 'Arial', sans-serif; fill: #2f3845; }
      .uc { font: 500 22px 'Arial', sans-serif; fill: #2f3845; }
      .line { stroke: #6e7d91; stroke-width: 2.2; fill: none; }
      .include { font: 500 18px 'Arial', sans-serif; fill: #5f6d80; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7d91"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#eef1f5"/>
  <text x="900" y="56" text-anchor="middle" class="title">UML Use Case диаграмма веб-тренажёра тестирования UI</text>

  <!-- Actor -->
  <g transform="translate(120,380)">
    <circle cx="90" cy="70" r="40" fill="#ffffff" stroke="#8593a7" stroke-width="3"/>
    <line x1="90" y1="110" x2="90" y2="230" stroke="#8593a7" stroke-width="3"/>
    <line x1="20" y1="150" x2="160" y2="150" stroke="#8593a7" stroke-width="3"/>
    <line x1="90" y1="230" x2="35" y2="320" stroke="#8593a7" stroke-width="3"/>
    <line x1="90" y1="230" x2="145" y2="320" stroke="#8593a7" stroke-width="3"/>
    <text x="90" y="370" text-anchor="middle" class="actor">Тестировщик</text>
  </g>

  <!-- System boundary -->
  <rect x="430" y="120" width="1260" height="860" rx="14" fill="#ffffff" stroke="#a2afc0" stroke-width="3"/>
  <text x="1060" y="165" text-anchor="middle" class="system-title">Система «Веб-тренажёр тестирования интерфейсов»</text>

  <!-- Use cases -->
  <ellipse cx="760" cy="270" rx="220" ry="58" fill="#d7e3f3" stroke="#98a8bf" stroke-width="2"/>
  <text x="760" y="278" text-anchor="middle" class="uc">Выбрать сценарий</text>

  <ellipse cx="1300" cy="270" rx="260" ry="58" fill="#d8e6d1" stroke="#9ab48f" stroke-width="2"/>
  <text x="1300" y="278" text-anchor="middle" class="uc">Пройти UI-сценарий</text>

  <ellipse cx="760" cy="430" rx="270" ry="58" fill="#f0e0c9" stroke="#b9a27d" stroke-width="2"/>
  <text x="760" y="438" text-anchor="middle" class="uc">Выбрать элемент интерфейса</text>

  <ellipse cx="1300" cy="430" rx="250" ry="58" fill="#d7e3f3" stroke="#98a8bf" stroke-width="2"/>
  <text x="1300" y="438" text-anchor="middle" class="uc">Создать баг-репорт</text>

  <ellipse cx="760" cy="590" rx="250" ry="58" fill="#d8e6d1" stroke="#9ab48f" stroke-width="2"/>
  <text x="760" y="598" text-anchor="middle" class="uc">Просмотреть найденные баги</text>

  <ellipse cx="1300" cy="590" rx="250" ry="58" fill="#f0e0c9" stroke="#b9a27d" stroke-width="2"/>
  <text x="1300" y="598" text-anchor="middle" class="uc">Редактировать баг-репорт</text>

  <ellipse cx="1030" cy="760" rx="220" ry="58" fill="#d7e3f3" stroke="#98a8bf" stroke-width="2"/>
  <text x="1030" y="768" text-anchor="middle" class="uc">Завершить сессию</text>

  <ellipse cx="1030" cy="900" rx="250" ry="58" fill="#d8e6d1" stroke="#9ab48f" stroke-width="2"/>
  <text x="1030" y="908" text-anchor="middle" class="uc">Проверить баг (заглушка)</text>

  <!-- Actor links -->
  <line x1="280" y1="450" x2="540" y2="270" class="line"/>
  <line x1="280" y1="470" x2="1038" y2="270" class="line"/>
  <line x1="280" y1="510" x2="500" y2="430" class="line"/>
  <line x1="280" y1="540" x2="1050" y2="430" class="line"/>
  <line x1="280" y1="570" x2="510" y2="590" class="line"/>
  <line x1="280" y1="600" x2="1050" y2="590" class="line"/>
  <line x1="280" y1="625" x2="810" y2="760" class="line"/>

  <!-- Includes/relations -->
  <line x1="1070" y1="430" x2="980" y2="430" class="line" marker-end="url(#arrow)"/>
  <text x="1005" y="410" class="include">&lt;&lt;include&gt;&gt;</text>

  <line x1="1120" y1="590" x2="1085" y2="900" class="line" marker-end="url(#arrow)"/>
  <text x="1125" y="760" class="include">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1300" y1="488" x2="1300" y2="532" class="line" marker-end="url(#arrow)"/>
  <text x="1310" y="518" class="include">&lt;&lt;include&gt;&gt;</text>
</svg>
