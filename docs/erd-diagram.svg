  <line x1="700" y1="245" x2="900" y2="245" stroke="#697789" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="800" y="229" text-anchor="middle" class="relation">1 ко многим</text>

  <line x1="1210" y1="400" x2="1210" y2="480" stroke="#697789" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1258" y="447" class="relation">1 ко многим</text>

  <path d="M 700 300 L 820 300 L 820 640 L 900 640" fill="none" stroke="#697789" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="740" y="287" class="relation">1 ко многим</text>

  <line x1="390" y1="450" x2="390" y2="520" stroke="#697789" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="440" y="493" class="relation">1 ко многим</text>
