      .tag { font: 700 16px 'Arial', sans-serif; fill: #677182; }
      .relation { font: 600 19px 'Arial', sans-serif; fill: #4a5563; }
      .icon { font: 20px 'Arial', sans-serif; fill: #59657a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
